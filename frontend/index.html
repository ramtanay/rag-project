<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <h1>AI Study Assistant</h1>
        <p>Upload PDFs and ask questions powered by AI</p>
    </header>

    <!-- Main Content -->
    <main id="main">
        
        <!-- Status Bar -->
        <div id="status-bar">
            <div id="status-spinner" class="spinner hidden"></div>
            <div id="status-message"></div>
        </div>

        <!-- Upload Section -->
        <section id="upload-section">
            <h2>📄 Upload Documents</h2>
            <div id="file-drop-area" class="drop-area">
                <input type="file" id="file-input" accept=".pdf" style="display: none;">
                <button id="upload-btn" type="button">Choose PDF</button>
                <p>or drag and drop a PDF here</p>
            </div>
            <div id="upload-history" class="upload-history"></div>
        </section>

        <!-- Question Section -->
        <section id="question-section">
            <h2>❓ Ask Questions</h2>
            <div id="doc-status" class="doc-status"></div>
            <form id="question-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="question-input" 
                        placeholder="What would you like to know?"
                        autocomplete="off"
                    >
                    <button type="submit" id="ask-btn">Ask</button>
                </div>
            </form>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="hidden">
            <h2>📖 Answer</h2>
            <div id="question-display" class="result-item"></div>
            <div id="answer-display" class="result-item"></div>
            <div id="chunks-display" class="result-item"></div>
        </section>

    </main>

    <!-- Footer -->
    <footer id="footer">
        <p>AI Study Assistant | Powered by FastAPI & Groq</p>
    </footer>

    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
